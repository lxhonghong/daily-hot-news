<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史存档 | 每日热点速递</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div>
                <div class="header-title">📚 历史存档</div>
                <div class="header-date">每日热点速递</div>
            </div>
            <div class="header-archive">
                <a href="../">← 返回今日</a>
            </div>
        </div>
    </header>

    <main class="content">
        <ul class="archive-list">
            {% for entry in archive_entries %}
            <li>
                <a href="{{ entry.filename }}">{{ entry.date }}</a>
                <span style="color: var(--color-text-secondary); font-size: 13px; margin-left: 8px;">
                    {{ entry.count }} 条新闻
                </span>
            </li>
            {% endfor %}
        </ul>
        {% if not archive_entries %}
        <p style="color: var(--color-text-secondary);">暂无存档</p>
        {% endif %}
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <div>数据来源: RSSHub · CurrentsAPI · arXiv · BBC · HN</div>
            <div>由 GLM-5.1 生成摘要</div>
        </div>
    </footer>
</body>
</html>
